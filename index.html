<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsplaner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #D7D7D6;
    --text: #272B36;
    --text-mid: #595D66;
    --muted: #A08A81;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeUp 0.7s ease both;
  }

  .logo {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-mid);
    margin-bottom: 14px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 8vw, 4rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
  }

  header h1 em { font-style: italic; color: #595D66; }

  header p {
    margin-top: 12px;
    color: var(--text-mid);
    font-size: 0.88rem;
    font-weight: 300;
    letter-spacing: 0.06em;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }

  .plan-card {
    display: flex;
    align-items: center;
    gap: 20px;
    border-radius: 18px;
    padding: 22px 26px;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    animation: fadeUp 0.7s ease both;
  }

  .plan-card:nth-child(1) { animation-delay: 0.15s; }
  .plan-card:nth-child(2) { animation-delay: 0.28s; }
  .plan-card:nth-child(3) { animation-delay: 0.41s; }

  /* Miriam – hvit med pastell lila stripe og avatar */
  .plan-card.miriam {
    background: #F4F2F7;
    border: 1px solid #B7B8BB;
    color: var(--text);
  }

  .plan-card.miriam::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #C9BDE0;
    border-radius: 4px 0 0 4px;
  }

  .plan-card.miriam:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(201,189,224,0.25);
  }

  /* Samy – Cloudy Sky med brun stripe og avatar */
  .plan-card.samy {
    background: #B7B8BB;
    border: 1px solid #a5a6a9;
    color: var(--text);
  }

  .plan-card.samy::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #A08A81;
    border-radius: 4px 0 0 4px;
  }

  .plan-card.samy:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(89,93,102,0.2);
  }

  /* Idrol – lys varm bakgrunn med rust stripe */
  .plan-card.idrol {
    background: #F4F2F0;
    border: 1px solid #D4B89A;
    color: var(--text);
  }

  .plan-card.idrol::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: #A03D2A;
    border-radius: 4px 0 0 4px;
  }

  .plan-card.idrol:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(160,61,42,0.18);
  }

  .idrol .card-avatar  { background: rgba(160,61,42,0.1); }

  .card-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .miriam .card-avatar { background: rgba(201,189,224,0.25); }
  .samy .card-avatar   { background: rgba(160,138,129,0.2); }

  .card-info { flex: 1; }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 400;
    margin-bottom: 3px;
    color: var(--text);
  }

  .card-sub { font-size: 0.76rem; color: var(--text-mid); font-weight: 300; letter-spacing: 0.04em; }

  .card-arrow { font-size: 1.1rem; color: var(--text-mid); transition: transform 0.2s ease; }
  .plan-card:hover .card-arrow { transform: translateX(4px); }

  .coming-soon { opacity: 0.5; cursor: default; pointer-events: none; }

  .badge {
    font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 2px 7px; border-radius: 20px;
    background: rgba(89,93,102,0.15); color: var(--text-mid);
    margin-left: 8px; vertical-align: middle;
  }

  footer {
    margin-top: 52px;
    font-size: 0.72rem;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    animation: fadeUp 0.7s 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Personal training plans</div>
  <h1>Choose <em>your</em> plan</h1>
  <p>Tap your name to open your plan</p>
</header>

<div class="cards">

  <a href="miriam.html" class="plan-card miriam">
    <div class="card-avatar">🫧</div>
    <div class="card-info">
      <div class="card-name">Miriam</div>
      <div class="card-sub">One missed bubble. One perfect rep.</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

  <div class="plan-card samy coming-soon">
    <div class="card-avatar">🐻</div>
    <div class="card-info">
      <div class="card-name">Samy <span class="badge">Coming soon</span></div>
      <div class="card-sub">I am the storm.</div>
    </div>
    <div class="card-arrow">→</div>
  </div>

  <a href="idrol.html" class="plan-card idrol">
    <div class="card-avatar">💢</div>
    <div class="card-info">
      <div class="card-name">Idrol</div>
      <div class="card-sub">Climbing in-game. Climbing IRL.</div>
    </div>
    <div class="card-arrow">→</div>
  </a>

</div>

<footer>training plans · made with ❤️</footer>

</body>
</html>
